<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoFetch</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
    background:#05070a;
    color:#e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}
.glass {
    background: rgba(15,23,42,0.85);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body class="min-h-screen p-6">

<div class="max-w-3xl mx-auto">

    <!-- Header -->
    <h1 class="text-5xl font-bold text-center mb-3 text-indigo-400">
        VideoFetch
    </h1>
    <p class="text-center text-slate-400 mb-10 text-sm">
        Paste links → Instantly download (YouTube, TikTok, Vimeo & more)
    </p>

    <!-- List -->
    <div id="list" class="space-y-4"></div>

    <!-- Add Button -->
    <div class="text-center mt-8">
        <button onclick="addRow()" 
            class="bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-xl font-bold">
            + Add Another Link
        </button>
    </div>

</div>

<!-- Template -->
<template id="tpl">
<div class="glass p-5 rounded-2xl">
    <div class="flex flex-col md:flex-row gap-3">

        <input type="text" placeholder="Paste video link here..."
            class="url flex-1 bg-black/40 border border-slate-800 px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">

        <button class="go bg-emerald-600 hover:bg-emerald-500 px-5 py-3 rounded-xl font-bold">
            Download
        </button>

        <button class="del bg-red-600 hover:bg-red-500 px-4 rounded-xl">
            ✕
        </button>
    </div>

    <div class="status hidden mt-4 text-sm text-indigo-400 font-medium"></div>
</div>
</template>

<script>
function addRow() {
    const tpl = document.getElementById("tpl").content.cloneNode(true);

    const row = tpl.querySelector(".glass");
    const input = tpl.querySelector(".url");
    const btn = tpl.querySelector(".go");
    const del = tpl.querySelector(".del");
    const status = tpl.querySelector(".status");

    btn.onclick = () => {
        const url = input.value.trim();
        if (!url) return;

        status.classList.remove("hidden");
        status.innerText = "🚀 Redirecting to downloader...";

        // 🔥 REDIRECT METHOD (NO CORS)
        window.open(
            "https://cobalt.tools/?u=" + encodeURIComponent(url),
            "_blank"
        );
    };

    del.onclick = () => row.remove();

    document.getElementById("list").appendChild(tpl);
}

addRow();
</script>

</body>
</html>
