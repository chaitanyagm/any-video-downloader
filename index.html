<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoFetch</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { background:#05070a; color:#e2e8f0; font-family:sans-serif; }
.glass { background: rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.08);}
.spin { animation: spin 1s linear infinite;}
@keyframes spin { to { transform: rotate(360deg);} }
</style>
</head>

<body class="p-6">

<h1 class="text-4xl text-center mb-8 font-bold text-indigo-400">VideoFetch</h1>

<div id="list" class="max-w-2xl mx-auto space-y-4"></div>

<div class="text-center mt-6">
<button onclick="addRow()" class="bg-indigo-600 px-6 py-3 rounded-xl">+ Add Link</button>
</div>

<template id="tpl">
<div class="glass p-4 rounded-xl">
<div class="flex gap-2">
<input class="url flex-1 bg-black p-3 rounded-lg" placeholder="Paste video link">
<button class="go bg-green-600 px-4 rounded-lg">Download</button>
<button class="del bg-red-600 px-3 rounded-lg">X</button>
</div>

<div class="status hidden mt-3 text-sm"></div>
</div>
</template>

<script>
const API = "https://api.cobalt.tools/api/json";

function addRow(){
  const tpl = document.getElementById("tpl").content.cloneNode(true);
  const row = tpl.querySelector("div");
  const input = tpl.querySelector(".url");
  const btn = tpl.querySelector(".go");
  const del = tpl.querySelector(".del");
  const status = tpl.querySelector(".status");

  btn.onclick = async () => {
    const url = input.value.trim();
    if(!url) return;

    status.classList.remove("hidden");
    status.innerHTML = "⏳ Processing...";

    try {
      const res = await fetch(API,{
        method:"POST",
        headers:{ "Content-Type":"application/json"},
        body: JSON.stringify({ url })
      });

      const data = await res.json();

      if(data.status !== "success" || !data.url){
        throw new Error("Failed to fetch video");
      }

      status.innerHTML = "🚀 Opening download...";
      
      // BEST WORKING METHOD
      window.open(data.url, "_blank");

    } catch(e){
      status.innerHTML = "❌ " + e.message;
    }
  };

  del.onclick = () => row.remove();

  document.getElementById("list").appendChild(tpl);
}
addRow();
</script>

</body>
</html>
